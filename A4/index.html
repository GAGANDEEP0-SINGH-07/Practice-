<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

            <button>SCROLL DOWN </button>
        </div>
        <div id="br">
            <h1>01</h1>
            <div id="br-mid">
                <p>31 May 2026 • Blog</p>
                <h2>Always be strong <br> and have values</h2>
            </div>
            <div id="br-right">
